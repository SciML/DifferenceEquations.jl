[Core]
versions = ["lts", "1", "pre"]

# Enzyme AD suite. Runs only on the current stable Julia ("1"), and is excluded from
# "All" (in_all = false) so the blanket `Pkg.test()` and the Downgrade lane do not run
# it. The Enzyme reverse-mode differentiation tooling is version-fragile in ways that
# are upstream of this package (the package code itself passes — Core covers lts/1/pre,
# and ForwardDiff-based AD is exercised in Core on every lane):
#   * "pre" (Julia 1.13-rc): Enzyme cannot differentiate the stdlib BLAS/LAPACK paths
#     (`gemv!`/`dot`/`potrf!` -> `ijl_lazy_load_and_lookup` / LLVM verification errors).
#   * "lts" (Julia 1.10): EnzymeTestUtils' `rand_tangent`/`map_fields_recursive` throws
#     `UndefRefError` building a tangent for a problem whose `ODEFunction`/`SymbolCache`
#     holds a `Dict{Any, Any}` with `#undef` internal slots (Julia-1.10 Dict layout);
#     it never reaches the package's AD code. Passes on Julia 1.12.
# Select explicitly with `GROUP=AD` to run this suite locally.
[AD]
versions = ["1"]
in_all = false

[QA]
versions = ["lts", "1"]
