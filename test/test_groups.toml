[Core]
versions = ["lts", "1", "pre"]

# Enzyme AD suite. Runs only on the current stable Julia ("1"), is non-blocking
# (continue_on_error), and is excluded from "All" (in_all = false) so the blanket
# `Pkg.test()` and the Downgrade lane do not run it. Select it with `GROUP=AD` to run
# locally (passes on Julia 1.12).
#
# Why "1" only, and why non-blocking:
#   * "pre" (Julia 1.13-rc): Enzyme cannot differentiate stdlib BLAS/LAPACK
#     (`gemv!`/`dot`/`potrf!` -> `ijl_lazy_load_and_lookup` / LLVM verification errors).
#   * "lts" (Julia 1.10): EnzymeTestUtils' `rand_tangent`/`map_fields_recursive` throws
#     `UndefRefError` on a `Dict{Any,Any}` with `#undef` slots inside the ODEFunction's
#     SymbolCache (Julia-1.10 Dict layout); it never reaches the package's AD code.
#   * "1": the suite passes locally (Julia 1.12), but the heavy Enzyme compilation
#     reliably exhausts the SciML self-hosted CI runner — three consecutive runs died
#     mid-compile at ~20 min with "self-hosted runner lost communication" and no logs.
# The package code itself is fine on every lane (Core covers lts/1/pre; ForwardDiff AD
# runs in Core), so the AD lane is kept non-blocking rather than gating merges on an
# infra/tooling failure. Drop `continue_on_error` once the runner can handle the compile.
[AD]
versions = ["1"]
in_all = false
continue_on_error = true

[QA]
versions = ["lts", "1"]
